<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>学生信息管理系统--删除学生信息功能</title>
</head>
<body>
<h1 align="center">学生信息管理系统--删除学生信息功能</h1>

<!-- 表单区域，整体居中 -->
<div align="center" style="display: flex; flex-direction: column; gap: 15px; width: 300px; margin: 0 auto;">

    <!-- 提示文字 -->
    <label>请输入学号或姓名：</label>

    <!-- 输入框 -->
    <input type="text" style="padding: 12px 24px; font-size: 18px; width: 100%;" placeholder="学号或姓名">

    <!-- 确定删除按钮，尺寸与首页一致 -->
    <button type="submit" style="padding: 24px 48px; font-size: 24px; margin-top: 10px;">确定删除</button>

</div>
</body>
</html>
